<!DOCTYPE html>
<html lang="tl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BAI NA BAI! 🎁</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="floaters" id="floaters"></div>

  <!-- STEP 1: Name Input Screen -->
  <div class="screen" id="screen-input">
    <div class="card card--input">
      <span class="gift-emoji">🎁</span>
      <h1 class="heading">May <span class="highlight">sasabihin ako sayo</span><br />bai</h1>
      <p class="sub-text">lagay mo name mo!</p>
      <div class="input-wrap">
        <input type="text" id="name-input" class="name-field" placeholder="name mo dito tol" maxlength="30"
          autocomplete="off" />
        <button class="btn-submit" id="btn-submit" onclick="revealPrank()">
          SUBMETh 🎉
        </button>
      </div>

    </div>
  </div>

  <!-- STEP 2: Prank Reveal Screen -->
  <div class="screen hidden" id="screen-reveal">
    <div class="card card--reveal">
      <span class="trophy">🏆</span>
      <p class="label-top">✦ Official Announcement ✦</p>
      <h1 class="reveal-main">Congratulations,</h1>
      <span class="reveal-name" id="reveal-name"><!-- name here --></span>
      <span class="reveal-accent">BADING KA! 🌈</span>
      <div class="divider"></div>
      <p class="sub-text">
        Nalaman na ng buong mundo.<br />
        <em>Wala nang maitatago pa.</em>
      </p>
      <div class="badge">🎉 Certified Baddieng Since Birth 🎉</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
